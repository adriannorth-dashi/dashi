# docker-compose.mainnet.yml — Production overrides for Mainnet
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.mainnet.yml up -d
#
# This file only overrides production-specific settings.
# All base service definitions remain in docker-compose.yml.

services:
  api:
    environment:
      GIN_MODE: release
      LOG_LEVEL: warn

  gaspool:
    environment:
      GAS_STATION_AUTH: ${GASPOOL_AUTH_TOKEN}
      RUST_LOG: warn
    # Tighten the restart policy for production
    restart: always

  postgres:
    restart: always
    # Increase shared_buffers for production load
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=100
      -c log_min_duration_statement=1000

  redis:
    restart: always
    # Persist to disk in production (AOF + RDB)
    command: >
      redis-server
      --appendonly yes
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

  nginx:
    restart: always
