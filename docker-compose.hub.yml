# Dashi — Docker Hub Quickstart
#
# Usage:
#   1. cp .env.example .env  (then fill in all values)
#   2. docker compose -f docker-compose.hub.yml up -d
#
# Docker Compose reads .env automatically from the same directory.
# All configuration lives in .env — this file contains no hardcoded values.

services:
  api:
    image: adriannorth/dashi-api:latest
    ports:
      - "${PORT:-8080}:8080"
    env_file: .env
    environment:
      GASPOOL_URL:  http://gaspool:${GASPOOL_RPC_PORT:-9527}
      DATABASE_URL: postgres://${POSTGRES_USER:-gasstation}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gasstation}
      REDIS_URL:    redis://redis:6379
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gaspool:
        condition: service_started
    networks:
      - dashi

  gaspool:
    image: adriannorth/dashi-gaspool:latest
    environment:
      GAS_STATION_AUTH: ${GASPOOL_AUTH_TOKEN}
    configs:
      - source: gaspool_config
        target: /config/gas-pool.yaml
    restart: unless-stopped
    networks:
      - dashi

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-gasstation}
      POSTGRES_USER:     ${POSTGRES_USER:-gasstation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gasstation}"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - dashi

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - dashi

volumes:
  postgres_data:
  redis_data:

networks:
  dashi:

configs:
  gaspool_config:
    content: |
      signer-config:
        local:
          keypair: "${GASPOOL_KEYPAIR}"

      rpc-host-ip: "0.0.0.0"
      rpc-port: ${GASPOOL_RPC_PORT:-9527}
      metrics-port: ${GASPOOL_METRICS_PORT:-9184}

      fullnode-url: "${SUI_RPC_URL:-https://fullnode.mainnet.sui.io:443}"

      gas-pool-config:
        redis:
          redis_url: "redis://redis:6379"

      coin-init-config:
        target-init-balance: ${GASPOOL_TARGET_BALANCE:-100000000}
        refresh-interval-sec: ${GASPOOL_REFRESH_INTERVAL:-86400}

      daily-gas-usage-cap: ${GASPOOL_DAILY_CAP:-1500000000000}
      max-sui-per-request: ${GASPOOL_MAX_PER_REQUEST:-2000000000}
      advanced-faucet-mode: false
