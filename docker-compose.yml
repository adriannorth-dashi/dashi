services:
  api:
    build: .
    env_file: .env
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gaspool:
        condition: service_started

  gaspool:
    build:
      context: .
      dockerfile: Dockerfile.gaspool
    volumes:
      - ./config:/config:ro
    environment:
      # Bearer token for the gas-pool REST API.
      # Must match GASPOOL_AUTH_TOKEN in .env.
      GAS_STATION_AUTH: ${GASPOOL_AUTH_TOKEN}
    network_mode: host
    restart: unless-stopped
    # gaspool is not exposed externally — it listens on 127.0.0.1:9527
    # and is only reachable by the api container via the host network.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       gasstation
      POSTGRES_USER:     gasstation
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasstation"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    network_mode: host

volumes:
  postgres_data:
  redis_data:
